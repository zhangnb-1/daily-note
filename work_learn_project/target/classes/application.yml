spring:
  application:
    name: myLearnProject
  kafka:
    broker:
      list: 192.168.2.224:32320
    max:
      request:
        size: 10485760
    buffer:
      memory: 10485760
    maxPollInterval: 1800000
    producer:
      properties:
        enable.idempotence: true
        # retries: 2147483647 # ?????????????
        delivery.timeout.ms: 30000 # 30???????????
        # ?????? ack 0.??????? ??????? 1.???leader?????? all/-1:???leader??????????????
        acks: 1
        request.timeout.ms: 30000 # ???????? <= delivery.timeout.ms?
        retry.backoff.ms: 100     # ????

rocketmq:
  # NameServer ??????
  name-server: 127.0.0.1:9876

  # Producer ??
  producer:
    # ???????????????????? group?
    group: my-producer-group

    # ????????????
    sendMessageTimeout: 3000

    # ????????
    retryTimesWhenSendFailed: 2
    retryTimesWhenSendAsyncFailed: 2

    # ????????????? 1MB
    maxMessageSize: 1048576

    # ??????????
    compressMessageBodyThreshold: 4096

    # ?????????????????
    instanceName: producer-instance-1

  # Consumer ???????????????
  consumer:
    # ?????????
    group: my-consumer-group

    # ?????
    consumeThreadMin: 10
    consumeThreadMax: 64

    # ??????????
    consumeTimeout: 15000

    # ????
    instanceName: consumer-instance-1

    # ?????CLUSTERING??????????BROADCASTING????
    messageModel: CLUSTERING

    # ?????CONCURRENTLY??????????ORDERLY??????
    consumeMode: CONCURRENTLY
